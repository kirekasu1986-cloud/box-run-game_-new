<html lang="id">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Box Run 🗿</title>  
    <style>  
        body {  
            margin: 0;  
            padding: 0;  
            background: #000;  
            display: flex;  
            justify-content: center;  
            align-items: center;

            top: 10px;

</head>  
<body>  
    <canvas id="canvas" width="800" height="400"></canvas>  
    <div id="info">Tekan E / Tap screen <br>Game by S1men 🛡️ V1.5🛑</div>  
    <script>  
    const canvas = document.getElementById('canvas');  
    const ctx = canvas.getContext('2d');  
    let W = 800;  
    let H = 400;  

    let state = 'welcome';  
    let score = 0;  
    let highScore = localStorage.getItem('boxRunHigh') ? parseInt(localStorage.getItem('boxRunHigh')) : 0;  
    let speed = 4;  
    let maxSpeed = 15; // ← SETTING BARU (bisa diubah di pojok atas kanan)  
    let playerX = 150;  
    let playerY = 250;  
    let playerSize = 50;  
    let velocity = 0;  
    let gravity = 0.8;  
    let isJumping = false;  
    let groundY = 300;  
    let obstacles = [];  
    let frame = 0;  
    let blinkTimer = 60;  
    let isBlinking = false;  
    let bob = 0;  
    let running = false;  
    let spawnCooldown = 0;   
    let lives = 3;           
    let isDarkMode = false;   
    let isLandscape = true;      

    let isPaused = false;
    let isResuming = false;
    let resumeFrame = 0;
    let countdownValue = 3;

    let notifications = [];
    let currentSpeedMult = 1;
    let speedMultEndFrame = 0;
    let scoreMultEndFrame = 0;
    let ghostEndFrame = 0;
    let shakeEndFrame = 0;
    let shortJumpEndFrame = 0;
    let frozenEndFrame = 0;
    let bigHitboxEndFrame = 0;
    let glitchEndFrame = 0;
    let autoEndFrame = 0;
    let lastAutoJumpFrame = 0;
    let shieldEndFrame = 0; // ← TAMENG BARU

    const obstacleEmojis = [
        '🌲','🌳','🌴','🌵','🍄','🪵','🪨','🏔️','🌋','🔥','🌪️','⚡','❄️','⛄',
        '🧊','🌊','🧱','⛓️','💣','🧨','☢️','☣️','🏆','🗿','⚔️','🧿','🧲','🗑️',
        '🐅','🐆','🦍','🦧','🐺','🐻','🐊','🐍','🐉','🦖','🦕','🦂','🕷️',
        '🦇','🦅','🦈','🐙','🦑',
        '🐐','🐒','🦆','🐘','🦏','🦛','🐫','🦒','🦘','🦬','🐂','🐎','🐖','🐑',
        '🐕','🐈','🐇','🦝','🦨','🦡','🐀','🐿️','🦔',
        '🚗','🚕','🚙','🚌','🚓','🚑','🚒','🚜','🏎️','🏍️','🛵','🚲','🛴',
        '🚂','🚁','✈️','🚀','🛸',
        '🍔','🍕','🌭','🍟','🍩','🍪','🎂','🍉','🍌','🍍','🌮','🌯','🍿',
        ' 👻','💀','👽','👾','🤖','🧟','🧛','💻','📱','📺','🕹️','⏰','⏳','🛡️'
          '🏔️⛰️','6️⃣7️⃣','🌴🌴🌴','🌠🌌','🚂🚃🚃','🚧🚧','⛽🛢️⚓','⚓🚚','🚛🚜','🏎️🚑','🚓🚕','🚐🏎️',
        '🏘️🏘️','🏠🏡','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊',
        '🏘️🏘️','🏠🏡','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊',
        '🏘️🏘️','🏠🏡','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊',
        '🏘️🏘️','🏠🏡','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊',
        '🏘️🏘️','🏠🏡','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊',
        '🏘️🏘️','🏠🏡','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊',
        '🏘️🏘️','🏠🏡','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊',
        '🏘️🏘️','🏠🏡','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊',
        '🏘️🏘️','🏠🏡','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊',
        '🏘️🏘️','🏠🏡','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊',
        '🏘️🏘️','🏠🏡','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊🌊','🌊🌊','🌊🌊',
    ];    

    const emojiEffects = {
        '💣': {damage: 999}, '🧨': {damage: 999}, '☢️': {damage: 999},
        '☣️': {damage: 999}, '⚔️': {damage: 2}, '💀': {damage: 999},
        '🍔': {heal: 1}, '🍕': {heal: 1}, '🌭': {heal: 1}, '🍟': {heal: 1},
        '🍩': {heal: 1}, '🍪': {heal: 1}, '🎂': {heal: 1}, 
        '🍉': {heal: 1}, '🍌': {heal: 1}, '🍍': {heal: 1},
        '🌮': {heal: 1}, '🌯': {heal: 1}, '🍿': {heal: 1},
        '🏆': {score: 50}, '💎': {x2: 300},
        '⚡': {speedMult: 1.5, dur: 180}, '🚀': {speedMult: 2.0, dur: 120},
        '🧊': {speedMult: 0.5, dur: 180},
        '🌪️': {shake: 120}, '⛓️': {shortJump: 240}, 
        '🕸️': {frozen: 90}, '🧱': {bigHitbox: 240},
        '📺': {glitch: 120}, '👻': {ghost: 180},
        '🤖': {auto: 120},
        '👽': {random: true}, '🗿': {random: true},
        '🛡️': {doubleHealth: true} // ← TAMENG BARU: 2x health + visual
    };

    function addNotification(text, color = '#fff') {
        notifications.push({text: text, color: color, life: 120});
    }

    function applySpecialEffect(emoji) {
        const eff = emojiEffects[emoji];
        if (!eff) return false;

        if (eff.random) {
            const randomKeys = Object.keys(emojiEffects).filter(k => 
                !['💣','🧨','☢️','☣️','⚔️','💀','👽','🗿'].includes(k)
            );
            const randEmoji = randomKeys[Math.floor(Math.random() * randomKeys.length)];
            applySpecialEffect(randEmoji);
            return true;
        }

        let notifText = '', notifColor = '#fff';

        if (eff.damage !== undefined) {
            if (eff.damage >= 999) lives = 0; else lives -= eff.damage;
            notifText = eff.damage >= 999 ? '💥 MATI INSTAN!' : `-${eff.damage} ❤️`;
            notifColor = '#f00';
            playDeathSound();
        } else if (eff.heal) {
            lives = Math.min(lives + eff.heal, 5);
            notifText = `+${eff.heal} ❤️`;
            notifColor = '#0f0';
        } else if (eff.score) {
            score += eff.score;
            notifText = `+${eff.score} SCORE`;
            notifColor = '#ffd700';
        } else if (eff.x2) {
            scoreMultEndFrame = frame + eff.x2;
            notifText = '💎 SCORE ×2 (5 detik)';
            notifColor = '#ffd700';
        } else if (eff.speedMult !== undefined) {
            currentSpeedMult = eff.speedMult;
            speedMultEndFrame = frame + (eff.dur || 180);
            notifText = eff.speedMult > 1 ? '⚡ CEPAT!' : '🧊 LAMBAT!';
            notifColor = eff.speedMult > 1 ? '#ff0' : '#0bf';
        } else if (eff.shake) {
            shakeEndFrame = frame + eff.shake;
            notifText = '🌪️ GOYANG!';
            notifColor = '#aaa';
        } else if (eff.shortJump) {
            shortJumpEndFrame = frame + eff.shortJump;
            notifText = '⛓️ LOMPAT PENDEK';
            notifColor = '#f80';
        } else if (eff.frozen) {
            frozenEndFrame = frame + eff.frozen;
            notifText = '🕸️ BEKU!';
            notifColor = '#88f';
        } else if (eff.bigHitbox) {
            bigHitboxEndFrame = frame + eff.bigHitbox;
            notifText = '🧱 HITBOX BESAR';
            notifColor = '#f80';
        } else if (eff.glitch) {
            glitchEndFrame = frame + eff.glitch;
            notifText = '📺 GLITCH!';
            notifColor = '#f0f';
        } else if (eff.ghost) {
            ghostEndFrame = frame + eff.ghost;
            notifText = '👻 TEMBUS RINTANGAN';
            notifColor = '#0ff';
        } else if (eff.auto) {
            autoEndFrame = frame + eff.auto;
            notifText = '🤖 AUTO JUMP';
            notifColor = '#0f0';
        } else if (eff.doubleHealth) { // TAMENG
            lives = Math.min(lives * 2, 6);
            shieldEndFrame = frame + 300; // visual 5 detik
            notifText = '🛡️ TAMENG 2X HEALTH!';
            notifColor = '#0ff';
        }

        if (notifText) addNotification(notifText, notifColor);
        return true;
    }

    let audioCtx;  
    function initAudio() {  
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();  
    }  
    function playJumpSound() { /* sama seperti sebelumnya */  
        initAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();  
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); gain.gain.value = 0.4;  
        osc.connect(gain).connect(audioCtx.destination); osc.start();  
        setTimeout(() => { osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.15);  
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3); }, 50);  
        setTimeout(() => osc.stop(), 300);  
    }  
    function playDeathSound() { /* sama */  
        initAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();  
        osc.type = 'sawtooth'; osc.frequency.value = 150; gain.gain.value = 0.6;  
        osc.connect(gain).connect(audioCtx.destination); osc.start();  
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);  
        setTimeout(() => osc.stop(), 800);  
    }  
    function playLandSound() { /* sama */  
        initAudio(); const noise = audioCtx.createBufferSource();  
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);  
        const data = buffer.getChannelData(0); for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;  
        noise.buffer = buffer; const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;  
        const gain = audioCtx.createGain(); gain.gain.value = 0.3;  
        noise.connect(filter).connect(gain).connect(audioCtx.destination); noise.start();  
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);  
    }  

    function resetGame() {  
        score = 0; speed = 4; obstacles = [];  
        playerY = groundY - playerSize; velocity = 0; isJumping = false; running = false;  
        frame = 0; spawnCooldown = 0; lives = 3;  
        isPaused = false; isResuming = false;  

        notifications = []; currentSpeedMult = 1; speedMultEndFrame = 0; scoreMultEndFrame = 0;  
        ghostEndFrame = 0; shakeEndFrame = 0; shortJumpEndFrame = 0; frozenEndFrame = 0;  
        bigHitboxEndFrame = 0; glitchEndFrame = 0; autoEndFrame = 0; lastAutoJumpFrame = 0;  
        shieldEndFrame = 0;  
    }  

    function toggleRotation() { /* sama */  
        isLandscape = !isLandscape;  
        if (isLandscape) { canvas.width = 800; canvas.height = 400; W = 800; H = 400; groundY = 300; playerX = 150; }  
        else { canvas.width = 400; canvas.height = 800; W = 400; H = 800; groundY = 700; playerX = 100; }  
        playerY = groundY - playerSize; isJumping = false; velocity = 0; obstacles = []; spawnCooldown = 0;  
    }  

    function spawnObstacle() {  
        const emoji = obstacleEmojis[Math.floor(Math.random() * obstacleEmojis.length)];  
        obstacles.push({ x: W + 50, emoji: emoji, size: 42 });  
    }  

    function update() {  
        if (state !== 'playing') return;  
        frame++;  

        notifications = notifications.filter(n => { n.life--; return n.life > 0; });

        if (isPaused) { /* sama */ return; }  

        blinkTimer--; if (blinkTimer <= 0) { isBlinking = true; if (blinkTimer < -8) { isBlinking = false; blinkTimer = 40 + Math.random() * 60; } }  
        bob = Math.sin(frame / 6) * 3;  

        if (running) {  
            score += 0.25 * ((frame < scoreMultEndFrame) ? 2 : 1);  
            speed = Math.min(4 + Math.floor(score / 50), maxSpeed); // ← PAKAI maxSpeed  

            spawnCooldown--;  
            if (spawnCooldown <= 0) { spawnObstacle(); spawnCooldown = Math.max(45, 160 - Math.floor(score / 15)); }  

            let moveSpeed = speed * ((frame < speedMultEndFrame) ? currentSpeedMult : 1);  
            for (let i = 0; i < obstacles.length; i++) obstacles[i].x -= moveSpeed;  
            if (obstacles.length > 0 && obstacles[0].x < -50) obstacles.shift();  

            if (isJumping) { /* sama */ }  

            if (frame < autoEndFrame && !isJumping && frame - lastAutoJumpFrame > 25 && obstacles.length > 0 && frame >= frozenEndFrame) { /* sama */ }  

            const isGhostActive = frame < ghostEndFrame;  
            if (!isGhostActive) {  
                const currentSize = (frame < bigHitboxEndFrame) ? 70 : playerSize;  
                const playerRect = { x: playerX, y: playerY, w: currentSize, h: currentSize };  
                for (let i = 0; i < obstacles.length; i++) {  
                    let obs = obstacles[i];  
                    const obsRect = { x: obs.x, y: groundY - obs.size, w: obs.size, h: obs.size };  
                    if (playerRect.x < obsRect.x + obsRect.w && playerRect.x + playerRect.w > obsRect.x &&  
                        playerRect.y < obsRect.y + obsRect.h && playerRect.y + playerRect.h > obsRect.y) {  
                        
                        const emoji = obs.emoji;  
                        if (emojiEffects[emoji]) applySpecialEffect(emoji);  
                        else {  
                            if (frame >= shieldEndFrame) { lives--; playDeathSound(); addNotification('-1 ❤️', '#c00'); }  
                            else addNotification('🛡️ PROTECTED!', '#0ff');  
                        }  
                        obstacles.splice(i, 1); i--;  
                        if (lives <= 0) { state = 'gameover'; /* sama */ return; }  
                    }  
                }  
            }  
        }  
    }  

    function draw() {  
        ctx.clearRect(0, 0, W, H);  
        const bgColor = isDarkMode ? '#1e1e1e' : '#ffffff';  
        const textColor = isDarkMode ? '#ffffff' : '#000000';  
        const highColor = isDarkMode ? '#ffd700' : '#d4a017';  

        ctx.fillStyle = bgColor; ctx.fillRect(0, 0, W, H);  

        if (state === 'welcome') { /* sama */ }  

        else if (state === 'playing') {  
            // WORLD  
            ctx.save(); let shakeX = 0, shakeY = 0;  
            if (frame < shakeEndFrame) { shakeX = Math.random()*8-4; shakeY = Math.random()*8-4; }  
            ctx.translate(shakeX, shakeY);  

            ctx.fillStyle = '#0b8c00'; ctx.fillRect(0, groundY, W, H - groundY);  

            const currentSize = (frame < bigHitboxEndFrame) ? 70 : playerSize;  
            const drawY = playerY + bob; const glitchActive = frame < glitchEndFrame;  
            ctx.fillStyle = glitchActive ? `hsl(${Math.floor(Math.random()*360)},100%,50%)` : '#e60000';  
            ctx.fillRect(playerX, drawY, currentSize, currentSize);  

            /* mata & rintangan sama seperti sebelumnya */  

            ctx.restore();  

            // === UI BARU ===  
            ctx.font = 'bold 28px Arial'; ctx.fillStyle = textColor; ctx.textAlign = 'left';  
            ctx.fillText(`Score: ${Math.floor(score)}`, 30, 50);  
            ctx.fillStyle = highColor; ctx.fillText(`highest score: ${highScore}`, 30, 85);  

            // MAX SPEED SETTING (pojok atas kanan)  
            ctx.font = 'bold 24px Arial'; ctx.fillStyle = '#ffd700'; ctx.textAlign = 'right';  
            ctx.fillText(`MAX SPEED: ${maxSpeed}`, W - 30, 35);  

            // HEALTH dengan TAMENG  
            ctx.font = 'bold 40px Arial'; ctx.fillStyle = '#c00'; ctx.textAlign = 'right';  
            const isShield = frame < shieldEndFrame;  
            const healthStr = isShield ? ('❤️🛡️').repeat(lives) : ('❤️').repeat(lives);  
            ctx.fillText(healthStr, W - 40, H - 40);  

            // ICONS pojok kiri bawah  
            ctx.font = '35px Arial'; ctx.fillStyle = textColor; ctx.textAlign = 'left';  
            ctx.fillText(isDarkMode ? '☀️' : '🌙', 30, H - 40);  
            ctx.fillText('◀️', 95, H - 40);  
            ctx.fillText('📱', 160, H - 40);  

            // Notifikasi  
            ctx.textAlign = 'right'; ctx.font = 'bold 26px Arial'; let notifY = 130;  
            for (let i = 0; i < notifications.length && i < 5; i++) {  
                const n = notifications[i]; ctx.globalAlpha = n.life > 60 ? 1 : n.life / 60;  
                ctx.fillStyle = n.color; ctx.fillText(n.text, W - 30, notifY); notifY += 36;  
            } ctx.globalAlpha = 1; ctx.textAlign = 'left';  

            // Instruction sama  
            /* pause overlay sama */  
        }  

        else if (state === 'gameover') { /* sama */ }  
    }  

    function handleInput(clientX, clientY) {  
        const rect = canvas.getBoundingClientRect();  
        const x = (clientX - rect.left) * (W / rect.width);  
        const y = (clientY - rect.top) * (H / rect.height);  

        // ICONS BAWAH KIRI (sama)  
        if (state === 'playing' && y > H - 80 && x < 210) { /* sama */ return; }  

        // === SETTING MAX SPEED (klik pojok atas kanan) ===  
        if (state === 'playing' && y < 60 && x > W - 300) {  
            const input = prompt(`Kecepatan maksimum saat ini: ${maxSpeed}\nMasukkan nilai baru (4-30):`, maxSpeed);  
            if (input !== null) {  
                let val = parseInt(input);  
                if (!isNaN(val) && val >= 4 && val <= 30) {  
                    maxSpeed = val;  
                    addNotification(`MAX SPEED diubah ke ${maxSpeed}`, '#ffd700');  
                } else alert('Nilai harus 4 sampai 30!');  
            }  
            return;  
        }  

        if (state === 'playing' && isPaused) return;  

        if (state === 'welcome') { state = 'playing'; resetGame(); document.getElementById('info').style.display = 'block'; }  
        else if (state === 'playing') {  
            if (!running) running = true;  
            else if (!isJumping && frame >= frozenEndFrame) {  
                velocity = (frame < shortJumpEndFrame) ? -12 : -16; isJumping = true; playJumpSound();  
            }  
        } else if (state === 'gameover') { state = 'playing'; resetGame(); }  
    }  

    document.addEventListener('keydown', (e) => { /* sama */ });  

    canvas.addEventListener('click', (e) => handleInput(e.clientX, e.clientY));  
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); if (e.touches.length > 0) handleInput(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });  

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }  
    window.onload = () => { gameLoop(); };  
    </script>  
</body>
