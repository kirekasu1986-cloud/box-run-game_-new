    function addNotification(text, color = '#fff') {
        notifications.push({text: text, color: color, life: 120});
    }

    function applySpecialEffect(emoji) {
        const eff = emojiEffects[emoji];
        if (!eff) return false;

        if (eff.random) {
            const randomKeys = Object.keys(emojiEffects).filter(k => 
                !['рЯТ£','рЯІ®','вШҐпЄП','вШ£пЄП','вЪФпЄП','рЯТА','рЯСљ','рЯЧњ'].includes(k)
            );
            const randEmoji = randomKeys[Math.floor(Math.random() * randomKeys.length)];
            applySpecialEffect(randEmoji);
            return true;
        }

        let notifText = '', notifColor = '#fff';

        if (eff.damage !== undefined) {
            if (eff.damage >= 999) lives = 0; else lives -= eff.damage;
            notifText = eff.damage >= 999 ? 'рЯТ• MATI INSTAN!' : `-${eff.damage} вЭ§пЄП`;
            notifColor = '#f00';
            playDeathSound();
        } else if (eff.heal) {
            lives = Math.min(lives + eff.heal, 5);
            notifText = `+${eff.heal} вЭ§пЄП`;
            notifColor = '#0f0';
        } else if (eff.score) {
            score += eff.score;
            notifText = `+${eff.score} SCORE`;
            notifColor = '#ffd700';
        } else if (eff.x2) {
            scoreMultEndFrame = frame + eff.x2;
            notifText = 'рЯТО SCORE √Ч2 (5 detik)';
            notifColor = '#ffd700';

        } else if (eff.shake) {

            notifText = 'рЯМ™пЄП GOYANG!';
            notifColor = '#aaa';
        } else if (eff.shortJump) {

            notifColor = '#f80';

    let audioCtx;  
    function initAudio() {  
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();  
    }  
    function playJumpSound() {  
        initAudio();  
        const osc = audioCtx.createOscillator();  
        const gain = audioCtx.createGain();  
        osc.type = 'sine';  
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);  
        gain.gain.value = 0.4;  
        osc.connect(gain).connect(audioCtx.destination);  
        osc.start();  
        setTimeout(() => {  
            osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.15);  
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);  
        }, 50);  
        setTimeout(() => osc.stop(), 300);  
    }  
    function playDeathSound() {  
        initAudio();  
        const osc = audioCtx.createOscillator();  
        const gain = audioCtx.createGain();  
        osc.type = 'sawtooth';  
        osc.frequency.value = 150;  
        gain.gain.value = 0.6;  
        osc.connect(gain).connect(audioCtx.destination);  
        osc.start();  
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);  
        setTimeout(() => osc.stop(), 800);  
    }  
    function playLandSound() {  
        initAudio();  
        const noise = audioCtx.createBufferSource();  
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);  
        const data = buffer.getChannelData(0);  
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;  
        noise.buffer = buffer;  
        const filter = audioCtx.createBiquadFilter();  
        filter.type = 'lowpass';  
        filter.frequency.value = 800;  
        const gain = audioCtx.createGain();  
        gain.gain.value = 0.3;  
        noise.connect(filter).connect(gain).connect(audioCtx.destination);  
        noise.start();  
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);  
    }

        glitchEndFrame = 0;
        autoEndFrame = 0;
        lastAutoJumpFrame = 0;

    function toggleRotation() {  
        isLandscape = !isLandscape;  
        if (isLandscape) {  
            canvas.width = 800; canvas.height = 400; W = 800; H = 400; groundY = 300; playerX = 150;  
        } else {  
            canvas.width = 400; canvas.height = 800; W = 400; H = 800; groundY = 700; playerX = 100;  
        }  
        playerY = groundY - playerSize;  
        isJumping = false; velocity = 0; obstacles = []; spawnCooldown = 0;  
    }  

    function spawnObstacle() {  
        const emoji = obstacleEmojis[Math.floor(Math.random() * obstacleEmojis.length)];  
        obstacles.push({ x: W + 50, emoji: emoji, size: 42 });  
    }  

    function update() {  
        if (state !== 'playing') return;  
        frame++;  

        notifications = notifications.filter(n => { n.life--; return n.life > 0; });

        if (isPaused) {  
            if (isResuming) {
                const elapsed = frame - resumeFrame;
                if (elapsed >= 180) { isPaused = false; isResuming = false; } 
                else { countdownValue = 3 - Math.floor(elapsed / 60); }
            }
            return;
        }  

        blinkTimer--;  
        if (blinkTimer <= 0) {  
            isBlinking = true;  
            if (blinkTimer < -8) { isBlinking = false; blinkTimer = 40 + Math.random() * 60; }  
        }  
        bob = Math.sin(frame / 6) * 3;  

        if (running) {  
            score += 0.25 * ((frame < scoreMultEndFrame) ? 2 : 1);  
            speed = Math.min(4 + Math.floor(score / 50), 15);  

            spawnCooldown--;  
            if (spawnCooldown <= 0) { spawnObstacle(); spawnCooldown = Math.max(45, 160 - Math.floor(score / 15)); }  

            let moveSpeed = speed * ((frame < speedMultEndFrame) ? currentSpeedMult : 1);  
            for (let i = 0; i < obstacles.length; i++) obstacles[i].x -= moveSpeed;  
            if (obstacles.length > 0 && obstacles[0].x < -50) obstacles.shift();  

            if (isJumping) {  
                velocity += gravity;  
                playerY += velocity;  
                if (playerY >= groundY - playerSize) {  
                    playerY = groundY - playerSize;  
                    isJumping = false;  
                    velocity = 0;  
                    playLandSound();  
                }  
            }  

            if (frame < autoEndFrame && !isJumping && frame - lastAutoJumpFrame > 25 && obstacles.length > 0 && frame >= frozenEndFrame) {  
                const first = obstacles[0];  
                if (first.x > playerX && first.x < playerX + 220) {  
                    velocity = (frame < shortJumpEndFrame) ? -12 : -16;  
                    isJumping = true;  
                    playJumpSound();  
                    lastAutoJumpFrame = frame;  
                }  
            }  

            const isGhostActive = frame < ghostEndFrame;  
            if (!isGhostActive) {  
                const currentSize = (frame < bigHitboxEndFrame) ? 70 : playerSize;  
                const playerRect = { x: playerX, y: playerY, w: currentSize, h: currentSize };  
                for (let i = 0; i < obstacles.length; i++) {  
                    let obs = obstacles[i];  
                    const obsRect = { x: obs.x, y: groundY - obs.size, w: obs.size, h: obs.size };  
                    if (playerRect.x < obsRect.x + obsRect.w &&  
                        playerRect.x + playerRect.w > obsRect.x &&  
                        playerRect.y < obsRect.y + obsRect.h &&  
                        playerRect.y + playerRect.h > obsRect.y) {  
                        
                        const emoji = obs.emoji;  
                        if (emojiEffects[emoji]) applySpecialEffect(emoji);  
                        else { lives--; playDeathSound(); addNotification('-1 вЭ§пЄП', '#c00'); }  

                        obstacles.splice(i, 1); i--;  
                        if (lives <= 0) {  
                            state = 'gameover';  
                            let finalScore = Math.floor(score);  
                            if (finalScore > highScore) { highScore = finalScore; localStorage.setItem('boxRunHigh', highScore); }  
                            return;  
                        }  
                    }  
                }  
            }  
        }  
    }  

    function draw() {  
        ctx.clearRect(0, 0, W, H);  
        const bgColor = isDarkMode ? '#1e1e1e' : '#ffffff';  
        const textColor = isDarkMode ? '#ffffff' : '#000000';  
        const highColor = isDarkMode ? '#ffd700' : '#d4a017';  

        ctx.fillStyle = bgColor; ctx.fillRect(0, 0, W, H);  

        if (state === 'welcome') {  
            ctx.font = 'bold 48px Arial'; ctx.fillStyle = textColor; ctx.textAlign = 'center';  
            ctx.fillText('Welcome to the', W/2, 120);  
            ctx.fillText('Box Run', W/2, 180);  
            ctx.font = '80px Arial'; ctx.fillText('рЯЧњ', W/2 + 220, 165);  
            ctx.font = 'bold 72px Arial'; ctx.fillText('Play', W/2 - 80, 300);  
            ctx.font = '80px Arial'; ctx.fillText('рЯЧњ', W/2 + 120, 310);  
        }  

        else if (state === 'playing') {  
            // === WORLD DULU (agar tidak menutupi UI) ===
            ctx.save();  
            let shakeX = 0, shakeY = 0;  
            if (frame < shakeEndFrame) { shakeX = Math.random()*8-4; shakeY = Math.random()*8-4; }  
            ctx.translate(shakeX, shakeY);  

            ctx.fillStyle = '#0b8c00'; ctx.fillRect(0, groundY, W, H - groundY);  

            const currentSize = (frame < bigHitboxEndFrame) ? 70 : playerSize;  
            const drawY = playerY + bob;  
            const glitchActive = frame < glitchEndFrame;  
            ctx.fillStyle = glitchActive ? `hsl(${Math.floor(Math.random()*360)},100%,50%)` : '#e60000';  
            ctx.fillRect(playerX, drawY, currentSize, currentSize);  

            if (!isBlinking) {  
                ctx.fillStyle = '#ffffff';  
                const eyeR = currentSize / 6.25; const pupilR = currentSize / 16.6;  
                const eyeY = drawY + currentSize * 0.36;  
                ctx.beginPath();  
                ctx.arc(playerX + currentSize*0.3, eyeY, eyeR, 0, Math.PI*2);  
                ctx.arc(playerX + currentSize*0.7, eyeY, eyeR, 0, Math.PI*2); ctx.fill();  
                ctx.fillStyle = '#000';  
                ctx.beginPath();  
                ctx.arc(playerX + currentSize*0.3, eyeY, pupilR, 0, Math.PI*2);  
                ctx.arc(playerX + currentSize*0.7, eyeY, pupilR, 0, Math.PI*2); ctx.fill();  
            } else {  
                ctx.strokeStyle = '#000'; ctx.lineWidth = currentSize / 12.5;  
                ctx.beginPath();  
                ctx.moveTo(playerX + currentSize*0.2, drawY + currentSize*0.36);  
                ctx.lineTo(playerX + currentSize*0.45, drawY + currentSize*0.36);  
                ctx.moveTo(playerX + currentSize*0.55, drawY + currentSize*0.36);  
                ctx.lineTo(playerX + currentSize*0.8, drawY + currentSize*0.36);  
                ctx.stroke();  
            }  

            ctx.font = '42px Arial'; ctx.textAlign = 'center';  
            for (let obs of obstacles) {  
                ctx.save();  
                if (glitchActive) ctx.translate(Math.random()*6-3, Math.random()*6-3);  
                ctx.fillText(obs.emoji, obs.x + obs.size/2, groundY - 5);  
                ctx.restore();  
            }  
            ctx.restore();  

            // === UI DI ATAS SEMUA (sekarang tidak tertutup tanah) ===
            ctx.font = 'bold 28px Arial'; ctx.fillStyle = textColor; ctx.textAlign = 'left';  
            ctx.fillText(`Score: ${Math.floor(score)}`, 30, 50);  
            ctx.fillStyle = highColor; ctx.fillText(`highest score: ${highScore}`, 30, 85);  

            ctx.font = 'bold 40px Arial'; ctx.fillStyle = '#c00'; ctx.textAlign = 'right';  
            ctx.fillText('вЭ§пЄП'.repeat(lives), W - 40, H - 40);  

            ctx.font = '35px Arial'; ctx.fillStyle = textColor; ctx.textAlign = 'left';  
            ctx.fillText(isDarkMode ? 'вШАпЄП' : 'рЯМЩ', 30, H - 40);  
            ctx.fillText('вЧАпЄП', 95, H - 40);  
            ctx.fillText('рЯУ±', 160, H - 40);  

            // Notifikasi buff (kanan atas)
            ctx.textAlign = 'right'; ctx.font = 'bold 26px Arial';  
            let notifY = 130;  
            for (let i = 0; i < notifications.length && i < 5; i++) {  
                const n = notifications[i];  
                ctx.globalAlpha = n.life > 60 ? 1 : n.life / 60;  
                ctx.fillStyle = n.color;  
                ctx.fillText(n.text, W - 30, notifY);  
                notifY += 36;  
            }  
            ctx.globalAlpha = 1; ctx.textAlign = 'left';  

            // Instruction
            ctx.font = 'bold 22px Arial'; ctx.fillStyle = textColor; ctx.textAlign = 'center';  
            ctx.fillText('Press E', W/2 - 80, H - 35);  
            ctx.font = '18px Arial'; ctx.fillText('рЯЦЃ', W/2 - 10, H - 35);  
            ctx.font = 'bold 22px Arial'; ctx.fillText('or screen', W/2 + 70, H - 35);  
            ctx.font = '30px Arial'; ctx.fillText('рЯУ±', W/2 + 160, H - 40);  

            if (isPaused) {  
                ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);  
                ctx.fillStyle = '#fff'; ctx.textAlign = 'center';  
                if (isResuming) {  
                    ctx.font = 'bold 140px Arial'; ctx.fillText(countdownValue.toString(), W/2, H/2 + 40);  
                } else {  
                    ctx.font = 'bold 70px Arial'; ctx.fillText('PAUSED', W/2, H/2 - 20);  
                    ctx.font = '30px Arial'; ctx.fillText('Tekan вЧАпЄП untuk lanjut', W/2, H/2 + 40);  
                }  
            }  
        }  

        else if (state === 'gameover') {  
            ctx.fillStyle = bgColor; ctx.fillRect(0,0,W,H);  
            ctx.fillStyle = '#0b8c00'; ctx.fillRect(0, groundY, W, H-groundY);  
            ctx.fillStyle = '#e60000'; ctx.fillRect(playerX + 8, playerY + 5, playerSize, playerSize);  
            ctx.strokeStyle = '#000'; ctx.lineWidth = 6;  
            ctx.beginPath(); ctx.moveTo(playerX+12,playerY+15); ctx.lineTo(playerX+38,playerY+38);  
            ctx.moveTo(playerX+38,playerY+15); ctx.lineTo(playerX+12,playerY+38); ctx.stroke();  

            ctx.font = 'bold 52px Arial'; ctx.fillStyle = '#c00'; ctx.textAlign = 'center';  
            ctx.fillText('GAME OVER', W/2, 120);  
            ctx.font = '28px Arial'; ctx.fillStyle = textColor;  
            ctx.fillText(`Score: ${Math.floor(score)}`, W/2, 190);  
            ctx.fillText(`Highest: ${highScore}`, W/2, 230);  

            ctx.fillStyle = '#000'; ctx.fillRect(W/2-130, H-60, 260, 55);  
            ctx.fillStyle = '#fff'; ctx.font = 'bold 32px Arial'; ctx.fillText('RESTART рЯЧњ', W/2, H-25);  
        }  
    }  

    function handleInput(clientX, clientY) {  
        const rect = canvas.getBoundingClientRect();  
        const x = (clientX - rect.left) * (W / rect.width);  
        const y = (clientY - rect.top) * (H / rect.height);  

        if (state === 'playing' && y > H - 80 && x < 210) {  
            if (x < 70) { isDarkMode = !isDarkMode; return; }  
            if (x > 80 && x < 130) {  
                if (!isPaused && !isResuming) isPaused = true;  
                else if (isPaused && !isResuming) { isResuming = true; resumeFrame = frame; countdownValue = 3; }  
                return;  
            }  
            if (x > 145 && x < 195) { toggleRotation(); return; }  
        }  

        if (state === 'playing' && isPaused) return;  

        if (state === 'welcome') {  
            state = 'playing'; resetGame(); document.getElementById('info').style.display = 'block';  
        } else if (state === 'playing') {  
            if (!running) running = true;  
            else if (!isJumping && frame >= frozenEndFrame) {  
                velocity = (frame < shortJumpEndFrame) ? -12 : -16;  
                isJumping = true; playJumpSound();  
            }  
        } else if (state === 'gameover') {  
            state = 'playing'; resetGame();  
        }  
    }  

    document.addEventListener('keydown', (e) => {  
        if (state === 'playing' && !isPaused) {  
            if (!running) running = true;  
            else if ((e.key === ' ' || e.key.toLowerCase() === 'e') && !isJumping && frame >= frozenEndFrame) {  
                velocity = (frame < shortJumpEndFrame) ? -12 : -16;  
                isJumping = true; playJumpSound();  
            }  
        }  
    });  

    canvas.addEventListener('click', (e) => handleInput(e.clientX, e.clientY));  
    canvas.addEventListener('touchstart', (e) => {  
        e.preventDefault();  
        if (e.touches.length > 0) handleInput(e.touches[0].clientX, e.touches[0].clientY);  
    }, { passive: false });  

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }  
    window.onload = () => { gameLoop(); };  
    </script>  
</body>
